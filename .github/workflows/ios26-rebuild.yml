name: Codex rebuild BHTwitter 11.98 iOS 26 fix

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout patched BHTwitter
        uses: actions/checkout@v4
        with:
          path: main
          submodules: recursive

      - name: Install build dependencies
        run: brew install make dpkg ldid

      - name: Add GNU Make to PATH
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Install cyan
        run: pip install https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Download iOS 16.5 SDK
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/ sdks
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv ./*.sdk "$THEOS/sdks/"

      - name: Download previous verified 11.98 artifact
        uses: actions/download-artifact@v4
        with:
          name: BHTwitter-latest_X-11.98_NeoFreeBird-icons_unsigned
          path: previous
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29645916652

      - name: Prepare 11.98 base IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p main/packages
          BASE_IPA="$(find previous -type f -name '*.ipa' -print -quit)"
          test -n "$BASE_IPA"
          cp "$BASE_IPA" main/packages/com.atebits.Tweetie2.ipa
          unzip -tq main/packages/com.atebits.Tweetie2.ipa

      - name: Compile and reinject patched BHTwitter
        working-directory: main
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          set -euo pipefail
          chmod +x build.sh
          ./build.sh --sideloaded
          test -f .theos/obj/debug/BHTwitter.dylib
          strings .theos/obj/debug/BHTwitter.dylib | grep 'setPrefetchingEnabled:' >/dev/null

      - name: Verify and package unsigned iOS 26 fix IPA
        shell: bash
        run: |
          set -euo pipefail
          GENERATED="$(find main/packages -maxdepth 1 -type f -name '*sideloaded*.ipa' -print | sort | tail -n 1)"
          test -n "$GENERATED"
          STAGE="$(mktemp -d)"
          ditto -x -k "$GENERATED" "$STAGE"
          APP_DIR="$(find "$STAGE/Payload" -mindepth 1 -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$APP_DIR"
          BUILT_DYLIB="$GITHUB_WORKSPACE/main/.theos/obj/debug/BHTwitter.dylib"
          EMBEDDED_DYLIB="$(find "$APP_DIR" -type f -name BHTwitter.dylib -print -quit)"
          test -n "$EMBEDDED_DYLIB"
          test "$(shasum -a 256 "$BUILT_DYLIB" | awk '{print $1}')" = "$(shasum -a 256 "$EMBEDDED_DYLIB" | awk '{print $1}')"
          strings "$EMBEDDED_DYLIB" | grep 'setPrefetchingEnabled:' >/dev/null
          find "$STAGE/Payload" -type d -name _CodeSignature -prune -exec rm -rf {} +
          find "$STAGE/Payload" -type f -name embedded.mobileprovision -delete
          OUTPUT="$GITHUB_WORKSPACE/BHTwitter-iOS26fix_X-11.98_NeoFreeBird-icons_unsigned.ipa"
          (cd "$STAGE" && /usr/bin/zip -qry "$OUTPUT" Payload)
          OUTPUT="$OUTPUT" python3 <<'PY'
          import os, plistlib, zipfile
          output = os.environ['OUTPUT']
          with zipfile.ZipFile(output) as z:
              names = z.namelist()
              plist_name = next(n for n in names if n.startswith('Payload/') and n.count('/') == 2 and n.endswith('.app/Info.plist'))
              plist = plistlib.loads(z.read(plist_name))
              assert plist['CFBundleIdentifier'] == 'com.atebits.Tweetie2'
              assert plist['CFBundleShortVersionString'] == '11.98'
              assert plist['CFBundleVersion'] == '12'
              assert plist['CFBundleIcons']['CFBundlePrimaryIcon']['CFBundleIconName'] == 'ProductionAppIcon'
              assert len(plist['CFBundleIcons']['CFBundleAlternateIcons']) == 60
              assert any(n.endswith('/BHTwitter.dylib') for n in names)
              assert any(n.endswith('/keychainfix.dylib') for n in names)
              assert not any('/_CodeSignature/' in n for n in names)
              assert not any(n.endswith('/embedded.mobileprovision') for n in names)
          print('Verified unsigned iOS 26 compatibility IPA:', os.path.getsize(output), 'bytes')
          PY
          echo "OUTPUT=$OUTPUT" >> "$GITHUB_ENV"
          echo "Source commit: $(git -C main rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "IPA SHA-256: $(shasum -a 256 "$OUTPUT" | awk '{print $1}')" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verified unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: BHTwitter-iOS26fix_X-11.98_NeoFreeBird-icons_unsigned
          path: ${{ env.OUTPUT }}
          compression-level: 0
          if-no-files-found: error
          retention-days: 30

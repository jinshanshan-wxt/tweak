name: Codex publish verified BHTwitter 11.98 IPA

on:
  push:
    paths:
      - '.github/workflows/codex-bhtwitter-1198.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download verified build artifact
        uses: actions/download-artifact@v4
        with:
          name: BHTwitter-latest_X-11.98_NeoFreeBird-icons_unsigned
          path: out
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29645916652

      - name: Verify and publish IPA to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IPA="out/BHTwitter-latest_X-11.98_NeoFreeBird-icons_unsigned.ipa"
          test -f "$IPA"
          echo "fd198a97d395bf9c10d56a6176c48b4d2deb00db6f0d74f2af8c91f56ed86129  $IPA" | sha256sum -c -
          gh release upload tweak "$IPA" --clobber --repo "${{ github.repository }}"
